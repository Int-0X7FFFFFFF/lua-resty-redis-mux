name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: openresty/openresty:jammy

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git make cpanminus redis-server

      - name: Start Redis
        run: |
          redis-server --daemonize yes
          redis-cli ping

      - name: Clone test-nginx
        run: |
          git clone --depth 1 https://github.com/openresty/test-nginx.git $GITHUB_WORKSPACE/../test-nginx

      - name: Install CPAN dependencies
        run: |
          cpanm --notest Test::Nginx

      - name: Run tests
        env:
          TEST_NGINX_TIMEOUT: 10
        run: |
          make test OPENRESTY_PREFIX=/usr/local/openresty PERL5LIB="/root/perl5/lib/perl5"
